owner: its-rory 
repo: upptime 

# ==========================================
# 监控节点配置（已修正缩进、层级和变量语法）
# ==========================================
sites:
  - name: Los Angeles VPS
    url: $LOS_ANGELES_VPS_URL
  - name: Los Angeles VPN
    url: $LOS_ANGELES_VPN_URL
  - name: HK VPN
    url: $HK_VPN_URL
  - name: Singapore VPS
    url: $SINGAPORE_VPS_URL

# ==========================================
# 状态页外观与路径配置（已修正域名冲突）
# ==========================================
status-website:
  # 如果你有自己的域名，才解开下行注释并修改；否则保持注释状态
  # cname: luoverse.cn
  
  # 无自定义域名时，必须解开 baseUrl 并正确对应你的仓库名
  baseUrl: /upptime
  
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: 实时系统状态监控
  introTitle: "主机与服务可用性综合观测面板"
  introMessage: "本页面完全基于 GitHub Actions 基础设施实现分布式全自动探活，数据每 5 分钟更新一次。"
  navbar:
    - title: 状态总览
      href: /upptime/
    - title: GitHub 仓库
      href: https://github.com/its-rory/upptime
